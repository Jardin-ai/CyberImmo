name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      # 未设 NEXT_PUBLIC_BASE_PATH 时默认 /cyberimmo（与 Worker 子路径一致）；独立根域名构建请设 Variable 为 __ROOT__
      - name: Build (OpenNext for Cloudflare)
        working-directory: web
        env:
          RAW_BASE: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set -e
          if [ "$RAW_BASE" = "__ROOT__" ]; then
            export NEXT_PUBLIC_BASE_PATH=""
          elif [ -n "$RAW_BASE" ]; then
            export NEXT_PUBLIC_BASE_PATH="$RAW_BASE"
          else
            export NEXT_PUBLIC_BASE_PATH="/cyberimmo"
          fi
          echo "NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-<empty>}"
          bun run build:cf

      # Pages 项目名须与 Cloudflare 控制台中的项目 slug 一致；可在 Repo → Settings → Variables 设置 CLOUDFLARE_PAGES_PROJECT 覆盖默认值 cyberimmo。
      - name: Deploy to Cloudflare Pages
        run: bun x wrangler pages deploy .open-next/assets --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT != '' && vars.CLOUDFLARE_PAGES_PROJECT || 'cyberimmo' }} --commit-dirty=true
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
