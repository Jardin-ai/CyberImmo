name: Deploy to Cloudflare (OpenNext Worker)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      # 未设 NEXT_PUBLIC_BASE_PATH 时默认 /cyberimmo；独立根域名 Variable 填 __ROOT__
      # 运行时 Worker 也需同名变量（见下方 deploy --var），否则 process.env 为空会 1101
      - name: Build (OpenNext for Cloudflare)
        id: opennext
        working-directory: web
        env:
          RAW_BASE: ${{ vars.NEXT_PUBLIC_BASE_PATH || secrets.NEXT_PUBLIC_BASE_PATH }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set -e
          if [ "$RAW_BASE" = "__ROOT__" ]; then
            export NEXT_PUBLIC_BASE_PATH=""
          elif [ -n "$RAW_BASE" ]; then
            export NEXT_PUBLIC_BASE_PATH="$RAW_BASE"
          else
            export NEXT_PUBLIC_BASE_PATH="/cyberimmo"
          fi
          echo "NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-<empty>}"
          {
            echo "base_path<<EOF"
            printf '%s' "$NEXT_PUBLIC_BASE_PATH"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          bun run build:cf

      # Token 须含 Account → Workers Scripts → Edit，否则 API 10000：https://dash.cloudflare.com/profile/api-tokens
      - name: Verify Cloudflare token (Workers permission)
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun x wrangler whoami

      # 注入运行时 env（与 OpenNext 文档一致）；--keep-vars 保留你在控制台里已配的其他变量
      - name: Deploy to Cloudflare (Worker + static assets)
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bun x wrangler deploy --keep-vars \
            --var "NEXT_PUBLIC_SUPABASE_URL:${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --var "NEXT_PUBLIC_SUPABASE_ANON_KEY:${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --var "NEXT_PUBLIC_BASE_PATH:${{ steps.opennext.outputs.base_path }}"
