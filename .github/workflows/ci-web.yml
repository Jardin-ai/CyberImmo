# CyberImmo Next应用：PR / push 时校验（默认构建，不含 static export）
name: CI web

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"

defaults:
  run:
    working-directory: web

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build (standard Next — 保留 API Routes)
        env:
          RAW_BASE: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ "$RAW_BASE" = "__ROOT__" ]; then
            export NEXT_PUBLIC_BASE_PATH=""
          elif [ -n "$RAW_BASE" ]; then
            export NEXT_PUBLIC_BASE_PATH="$RAW_BASE"
          else
            export NEXT_PUBLIC_BASE_PATH="/CyberImmo"
          fi
          bun run build
