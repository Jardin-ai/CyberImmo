# OpenNext：用 Workers + Static Assets 部署（不要用 wrangler pages deploy 只传 assets）
# 文档：https://opennext.js.org/cloudflare/get-started
name = "cyberimmo"
main = ".open-next/worker.js"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
# middleware / next.config headers & proxy 需经 Worker；见 https://opennext.js.org/cloudflare/howtos/assets
run_worker_first = true

# OpenNext 自调用（名称须与上方 name 一致）
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "cyberimmo"

# 免费 Workers 计划不支持 [limits]（会报 100328）。付费计划若需提高 CPU 再取消注释：
# [limits]
# cpu_ms = 50000

# 需要 KV 时：bunx wrangler kv namespace create CACHE，填入 id 后取消注释
# [[kv_namespaces]]
# binding = "CACHE"
# id = "<your-kv-id>"
